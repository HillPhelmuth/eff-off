name: Publish and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

env:
  REGISTRY: docker.io
  IMAGE_NAME: hillphelmuth/effoff
  DEPLOY_TAG: sha-${{ github.sha }}
  ACA_NAME: eff-off
  ACA_RESOURCE_GROUP: hermes-agent-made-rg

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Health-check syntax (node --check)
        run: node --check server/index.js && node --check server/prompt.js

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.DEPLOY_TAG }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push container
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Capture deploy image reference
        id: image
        if: github.event_name != 'pull_request'
        run: echo "ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.DEPLOY_TAG }}" >> "$GITHUB_OUTPUT"

  deploy-to-aca:
    if: github.event_name != 'pull_request'
    needs: build-and-publish
    runs-on: ubuntu-latest
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy image to Azure Container App
        run: |
          az containerapp update \
            --name "${{ env.ACA_NAME }}" \
            --resource-group "${{ env.ACA_RESOURCE_GROUP }}" \
            --image "${{ needs.build-and-publish.outputs.image }}"

      - name: Ensure external ingress on port 3000
        run: |
          az containerapp ingress enable \
            --name "${{ env.ACA_NAME }}" \
            --resource-group "${{ env.ACA_RESOURCE_GROUP }}" \
            --type external \
            --target-port 3000 \
            --transport auto

      - name: Show application URL
        run: |
          az containerapp show \
            --name "${{ env.ACA_NAME }}" \
            --resource-group "${{ env.ACA_RESOURCE_GROUP }}" \
            --query properties.configuration.ingress.fqdn \
            --output tsv

  # Optional GitHub Pages static shell (token endpoint still needs a backend).
  # Primary publish artifact is the Docker Hub image above.
